<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}

{% seo %}
  </head>

  <body>
    <div class="terminal-window">
      <div class="terminal-header">
        <div class="terminal-dots">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
        <div class="terminal-title" style="margin-left: 50px">{{ site.title | default: site.github.repository_name }}:~</div>
      </div>

      <nav class="terminal-tabs">
        <a href="{{ '/' | relative_url }}" class="tab-item {% if page.url == '/' %}is-active{% endif %}">main()</a>
        <a href="{{ '/about' | relative_url }}" class="tab-item {% if page.url contains 'about' %}is-active{% endif %}">About</a>
        <a href="{{ '/blogs' | relative_url }}" class="tab-item {% if page.url contains 'blogs' %}is-active{% endif %}">blogs</a>
        <a href="/feed.xml" class="tab-item" style="margin-left: auto">RSS</a>
      </nav>

      <div class="container">
        <section id="main_content">
          {{ content }}
        </section>
      </div>
    </div>
    <script>
             // Add copy buttons to code blocks
        document.querySelectorAll('pre').forEach(function(pre) {
          const button = document.createElement('button');
          button.className = 'btn';
          button.textContent = 'Copy';
          
          button.addEventListener('click', function() {
            const code = pre.querySelector('code') || pre;
            const text = code.textContent;
            
            navigator.clipboard.writeText(text).then(function() {
              button.textContent = 'Copied!';
              
              setTimeout(function() {
                button.textContent = 'Copy';
              }, 2000);
            });
          });
          
          pre.appendChild(button);
      });
    </script>
  </body>
</html>
